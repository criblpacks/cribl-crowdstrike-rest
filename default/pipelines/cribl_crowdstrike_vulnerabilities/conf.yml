output: default
streamtags: []
groups: {}
asyncFuncTimeout: 1000
functions:
  - id: comment
    filter: "true"
    disabled: null
    conf:
      comment: Parse and remove unneeded fields from Crowdstrike Vulnerability logs
  - id: comment
    filter: "true"
    disabled: null
    conf:
      comment: "Author: Cribl Packs Team"
  - id: serde
    filter: "true"
    disabled: null
    conf:
      mode: extract
      type: json
      srcField: _raw
      remove:
        - _raw
    description: Parse the fields from the JSON event in _raw
  - id: eval
    filter: "true"
    disabled: false
    conf:
      remove:
        - aid
        - cid
        - "*_id"
        - "*ids"
        - evaluation_logic*
    description: Remove unneeded/redundant fields
  - id: serialize
    filter: "true"
    disabled: false
    conf:
      type: json
      dstField: _raw
      fields:
        - "!cribl_*"
        - "!_*"
        - "!source"
        - "!host"
        - "*"
    description: "Serialize as JSON back into _raw "
  - id: eval
    filter: "true"
    disabled: false
    conf:
      keep:
        - _*
        - cribl_*
        - host
        - source
      remove:
        - "*"
    description: Cleanup fields
